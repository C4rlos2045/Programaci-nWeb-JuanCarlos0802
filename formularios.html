<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios en HTML</title>
</head>

<body>
    <div id="main-content">
        <h1>Implementacion de formularios en HTML</h1>
        <h2>Permite la interaccion con el usuario</h2>
        <hr>

        <section class="form-tag">
            <form action="url" class="formulario">
                <fieldset>
                    <legend>Formulario en html - Obtener datos </legend>
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required placeholder="Ana López Pérez"/> 
                    <br><br>
                    <label for="clave">Contrase&ntilde;a;</label>
                    <input type="password" name="clave" id="clave" required/> 
                    <br><br>
                    <label for="edad">Edad</label>
                    <input type="number" name="edad" id="edad" max="90" min="18" step="2"/>  <!-- readonly solo es para que se visualice y no modifique-->
                    <br><br>
                    <label for="municipio">Municipio</label>
                    <select id="municipio" required>
                        <option>Seleccione su municipio</option>
                        <option value="1">Jocotitlán</option>
                        <option value="2">San Felipe</option>
                        <option value="3">Atlacomulco</option>
                        <option value="4">Ixtlahuaca</option>
                    </select>
                    <br><br>

                    <label for="habilidades">Habilidades</label>
                    <select name="" id="habilidades" multiple>
                        <option value="0">Seleccione sus habilidades</option>
                        <option value="1">Programaci&oacute;n</option>
                        <option value="2">Dise&ntilde;o</option>
                        <option value="3">Seguridad infrorm&aacute;tica</option>
                        <option value="4">Redes</option>
                    </select>
                    <br><br>
                    <label for="correo">Correo</label>
                    <input type="email" name="correo" id="correo" required placeholder="ejemplo@dominio.com"/>
                    <br><br>
                    <label for="fecha">Fecha de nacimiento</label>
                    <input type="date" name="" id="nacimiento" min="2000-01-01" max="2002-01-01" value="12/12/2001"/>

                    <br><br>
                    Adjunta Imagen <input type="file" name="" id="">
                    <br><br>

                    <input type="submit" value="Enviar"/>
                    <br><br>
                
                    

                </fieldset>

            </form>
        </section>
    </div>
</body>
</html>
